  .num { font-size: 20px; font-weight: 900; fill: #ffffff; }
  .metric { font-size: 42px; font-weight: 900; fill: #0f172a; }

  @keyframes flowCardPulse {
    0%, 100% { fill: #ffffff; fill-opacity: 1; stroke-width: 2; filter: none; transform: scale(1); }
    4% { fill: #dcfce7; fill-opacity: .92; stroke: #22c55e; stroke-width: 4; filter: url(#green-explode); transform: scale(1.004); }
    8% { fill: #39ff88; fill-opacity: .62; stroke: #00ff66; stroke-width: 6; filter: url(#green-explode); transform: scale(1.012); }
    12% { fill: #bbf7d0; fill-opacity: .82; stroke: #00d45a; stroke-width: 4; filter: url(#green-explode); transform: scale(1.004); }
    18% { fill: #ffffff; fill-opacity: 1; stroke-width: 2; filter: none; transform: scale(1); }
  }
  @keyframes chipPulse {
    0%, 100% { fill: #ffffff; fill-opacity: 1; filter: none; transform: scale(1); }
    5% { fill: #dcfce7; fill-opacity: .95; stroke: #22c55e; filter: url(#green-explode); transform: scale(1.01); }
    9% { fill: #39ff88; fill-opacity: .76; stroke: #00ff66; filter: url(#green-explode); transform: scale(1.035); }
    15% { fill: #ffffff; fill-opacity: 1; filter: none; transform: scale(1); }
  }
  @keyframes traceFlow {
    to { stroke-dashoffset: -52; }
  }
  .flow-trace { stroke: #00a8ff; stroke-width: 10; stroke-linecap: round; stroke-dasharray: 20 36; opacity: .9; animation: traceFlow 4.4s linear infinite; filter: url(#diamond-glow); }
  .flow-diamond { filter: url(#diamond-glow); }
  .trace-1 { animation-delay: 0s; }
  .trace-2 { animation-delay: 1.1s; }
  .trace-3 { animation-delay: 2.2s; }
  .trace-4 { animation-delay: 3.3s; }
  .trace-5 { animation-delay: 4.4s; }
  .trace-6 { animation-delay: 5.5s; }
  .flow-card { transform-box: fill-box; transform-origin: center; animation: flowCardPulse 10.8s ease-in-out infinite; }
  .chip-pill { transform-box: fill-box; transform-origin: center; animation: chipPulse 10.8s ease-in-out infinite; }
  .flow-card-1, .chip-step-1 { animation-delay: 0s; }
  .flow-card-2, .chip-step-2 { animation-delay: 1.35s; }
  .flow-card-3, .chip-step-3 { animation-delay: 2.7s; }
  .flow-card-4, .chip-step-4 { animation-delay: 4.05s; }
  .flow-card-5, .chip-step-5 { animation-delay: 5.4s; }
  .flow-card-6, .chip-step-6 { animation-delay: 6.75s; }
  .flow-particle { pointer-events: none; }
  .green-burst { pointer-events: none; }
  @media (prefers-reduced-motion: reduce) {
    .flow-card, .chip-pill, .flow-trace, .data-beacon { animation: none; }
    .flow-particle, .flow-trace { display: none; }
    .green-burst { display: none; }
  }

</style>
