<text x="64" y="122" font-size="15" font-weight="800" fill="#2563eb" letter-spacing="2.4">HOW THE SELF-HEALING CLOSE WORKS</text>
<text x="62" y="180" font-size="42" font-weight="800" fill="#0f2a5c" letter-spacing="-0.6">The Close That</text>
<text x="62" y="228" font-size="42" font-weight="800" fill="#0f2a5c" letter-spacing="-0.6">Checks Itself</text>
<text x="64" y="270" font-size="17" font-weight="600" fill="#5b6b84">It drafts the work, re-checks every figure, and books</text>
<text x="64" y="295" font-size="17" font-weight="600" fill="#5b6b84">what ties. You only touch the true judgment calls.</text>

