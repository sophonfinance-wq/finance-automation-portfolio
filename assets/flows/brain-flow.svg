<g class="flow-particle" opacity="0">
  <polygon class="flow-diamond" points="0,-9 9,0 0,9 -9,0" fill="url(#diamond-blue)" stroke="#ffffff" stroke-width="1.8"/>
  <circle r="2.2" fill="#ffffff"/>
  <animateMotion dur="10.8s" begin="7.714s" repeatCount="indefinite" path="M320,1548 L320,1592"/><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.03;0.08;0.16;0.22;1" dur="10.8s" begin="7.714s" repeatCount="indefinite"/>
