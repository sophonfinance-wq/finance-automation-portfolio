  <circle r="2.2" fill="#ffffff"/>
  <animateMotion dur="10.8s" begin="1.543s" repeatCount="indefinite" path="M320,572 L320,616"/><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.03;0.08;0.16;0.22;1" dur="10.8s" begin="1.543s" repeatCount="indefinite"/>
</g>
