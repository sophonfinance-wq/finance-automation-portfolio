<line x1="320" y1="816" x2="320" y2="860" stroke="#4f46e5" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow-i)"/>
<g class="flow-particle" opacity="0">
  <polygon class="flow-diamond" points="0,-9 9,0 0,9 -9,0" fill="url(#diamond-blue)" stroke="#ffffff" stroke-width="1.8"/>
  <circle r="2.2" fill="#ffffff"/>
  <animateMotion dur="10.8s" begin="3.086s" repeatCount="indefinite" path="M320,816 L320,860"/><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.03;0.08;0.16;0.22;1" dur="10.8s" begin="3.086s" repeatCount="indefinite"/>
</g>
<line class="flow-trace" style="animation-delay:3.3s" x1="320" y1="1060" x2="320" y2="1104"/>
<line x1="320" y1="1060" x2="320" y2="1104" stroke="#4f46e5" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow-i)"/>
<g class="flow-particle" opacity="0">
  <polygon class="flow-diamond" points="0,-9 9,0 0,9 -9,0" fill="url(#diamond-blue)" stroke="#ffffff" stroke-width="1.8"/>
  <circle r="2.2" fill="#ffffff"/>
  <animateMotion dur="10.8s" begin="4.629s" repeatCount="indefinite" path="M320,1060 L320,1104"/><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.03;0.08;0.16;0.22;1" dur="10.8s" begin="4.629s" repeatCount="indefinite"/>
</g>
<line class="flow-trace" style="animation-delay:4.4s" x1="320" y1="1304" x2="320" y2="1348"/>
<line x1="320" y1="1304" x2="320" y2="1348" stroke="#4f46e5" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow-i)"/>
<g class="flow-particle" opacity="0">
  <polygon class="flow-diamond" points="0,-9 9,0 0,9 -9,0" fill="url(#diamond-blue)" stroke="#ffffff" stroke-width="1.8"/>
  <circle r="2.2" fill="#ffffff"/>
  <animateMotion dur="10.8s" begin="6.171s" repeatCount="indefinite" path="M320,1304 L320,1348"/><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.03;0.08;0.16;0.22;1" dur="10.8s" begin="6.171s" repeatCount="indefinite"/>
</g>
