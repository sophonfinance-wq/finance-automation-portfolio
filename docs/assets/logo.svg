<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 48" width="256" height="48"
     role="img" aria-label="Sophon Finance Systems — Finance &amp; Accounting Automation">
  <title>Sophon Finance Systems</title>
  <desc>Primary two-line lockup: rising chart mark, wordmark, and blue descriptor.
  The descriptor's left edge sits on the S of Sophon; both text lines share one
  left margin at x=40. Geometry is exact; the two text lines depend on the IBM
  Plex webfonts and fall back to the generic sans/mono stacks.</desc>

  <!-- mark: the line climbs, the baseline holds. 30x30 at the origin. -->
  <g transform="translate(0,9) scale(0.625)">
    <path d="M10 30 L19 21 L27 26 L38 14" fill="none" stroke="#0f62fe"
          stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="38" cy="14" r="3" fill="#0f62fe"/>
    <rect x="10" y="35" width="28" height="3" fill="#161616"/>
  </g>

  <!-- wordmark: 18px, 600 against 300 -->
  <text x="40" y="24.5" fill="#161616" letter-spacing="0.2"
        font-family="'IBM Plex Sans',-apple-system,'Segoe UI',Helvetica,Arial,sans-serif"
        font-size="18"><tspan font-weight="600">Sophon </tspan><tspan font-weight="300">Finance Systems</tspan></text>

  <!-- descriptor: 9.5px mono, 0.9 tracking — measures 204.5px against the
       wordmark's 206.2px, so it tucks a hair inside rather than overhanging -->
  <text x="40" y="38" fill="#0f62fe" font-weight="500" letter-spacing="0.9"
        font-family="'IBM Plex Mono',ui-monospace,'Cascadia Mono',Consolas,monospace"
        font-size="9.5">FINANCE &amp; ACCOUNTING AUTOMATION</text>
</svg>
