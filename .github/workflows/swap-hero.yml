name: swap-hero
on: workflow_dispatch
permissions:
  contents: write
jobs:
  swap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: fetch verified extended hero film
        run: |
          curl -fsSL -o docs/assets/hero-web.mp4 "https://d2ol7oe51mr4n9.cloudfront.net/user_3FT2vQpL2ETEU7cpreHRkz8vsHo/88f6665b-6c58-4f03-a3a1-6ba3fe15220e.mp4"
          echo "ce0d36410188a1867295bd731a251859d30c20867dc3f6f1eeb386f9836891d6  docs/assets/hero-web.mp4" | sha256sum -c
      - name: commit to main
        run: |
          git config user.name "sophonfinance-wq"
          git config user.email "contact@sophonfinance.com"
          git add docs/assets/hero-web.mp4
          git commit -m "site: extend the hero film - part two mixed in after the logo card, 69s total"
          git push
