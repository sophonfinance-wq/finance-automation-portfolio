name: swap-hero4
on: workflow_dispatch
permissions:
  contents: write
jobs:
  swap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: fetch verified hero film
        run: |
          curl -fsSL -o docs/assets/hero-web.mp4 "https://d2ol7oe51mr4n9.cloudfront.net/user_3FT2vQpL2ETEU7cpreHRkz8vsHo/391f33e7-be0a-4acd-a88d-8609be191fb2.mp4"
          echo "9895e112c66c372b62f29262613b6e7c1801c1826b92c98b8deb9014ee4084bf  docs/assets/hero-web.mp4" | sha256sum -c
      - name: commit to main
        run: |
          git config user.name "sophonfinance-wq"
          git config user.email "contact@sophonfinance.com"
          git add docs/assets/hero-web.mp4
          git commit -m "site: hero finale rebuilt as stacked lockup end card - fits any phone crop"
          git push
