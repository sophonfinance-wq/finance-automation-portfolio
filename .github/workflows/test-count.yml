name: test-count

# Reproducible proof of the headline test count shown on sophonfinance.com/tests/.
# Runs root collection with the engine/site-tooling tiers explicit, asserts the
# live values against counts.json, and writes the numbers into the
# GitHub Actions run summary, so anyone can click through from the site and see
# the count regenerated from source — not just typed on a web page.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      sweep:
        description: "Also collect the opt-in SWEEP tier (~1.1M cases, ~2 min)"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  count:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Collect the curated suite
        shell: bash
        run: |
          set -euo pipefail
          curated=$(python -m pytest --collect-only -q -m "not site_tooling" | tail -1)
          site_tooling=$(python -m pytest --collect-only -q -m "site_tooling" | tail -1)
          curated_count=$(printf '%s\n' "$curated" | sed -E 's/^([0-9]+).*/\1/')
          site_tooling_count=$(printf '%s\n' "$site_tooling" | sed -E 's/^([0-9]+).*/\1/')
          expected_curated=$(python -c 'import json; print(json.load(open("site-datasheets/counts.json"))["portfolio_curated"]["tests"])')
          expected_site_tooling=$(python -c 'import json; print(json.load(open("site-datasheets/counts.json"))["site_tooling"]["tests"])')
          test "$curated_count" = "$expected_curated"
          test "$site_tooling_count" = "$expected_site_tooling"
          echo "Curated: $curated"
          {
            echo "# Automated test count"
            echo ""
            echo "Regenerated from source on this runner — fictional/seeded data, MIT licensed."
            echo ""
            echo "## Curated engine suite (\`pytest -m 'not site_tooling'\`, gates CI)"
            echo ""
            echo '```'
            echo "\$ pytest --collect-only -q -m \"not site_tooling\" | tail -1"
            echo "$curated"
            echo '```'
            echo ""
            echo "### By engine"
            echo ""
            echo "| Engine | Curated tests |"
            echo "|---|---:|"
            python -m pytest --collect-only -q -m "not site_tooling" \
              | grep '::' \
              | sed -E 's#/.*##' \
              | sort | uniq -c | sort -rn \
              | awk '{printf "| %s | %s |\n", $2, $1}'
            echo ""
            echo "### Site tooling (excluded from the engine headline above)"
            echo ""
            echo '```'
            echo "\$ pytest --collect-only -q -m site_tooling | tail -1"
            echo "$site_tooling"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Collect the opt-in SWEEP tier
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.sweep }}
        shell: bash
        env:
          SWEEP: "1"
        run: |
          set -euo pipefail
          sweep=$(python -m pytest --collect-only -q -m "not site_tooling" | tail -1)
          echo "Sweep: $sweep"
          {
            echo ""
            echo "## Opt-in property sweep (\`SWEEP=1 pytest\`)"
            echo ""
            echo '```'
            echo "\$ SWEEP=1 pytest --collect-only -q -m \"not site_tooling\" | tail -1"
            echo "$sweep"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
