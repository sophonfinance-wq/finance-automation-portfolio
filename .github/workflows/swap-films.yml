name: swap-films
on: workflow_dispatch
permissions:
  contents: write
jobs:
  swap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: fetch verified 720p films
        run: |
          curl -fsSL -o docs/assets/hero-web.mp4 "https://d2ol7oe51mr4n9.cloudfront.net/user_3FT2vQpL2ETEU7cpreHRkz8vsHo/5b8368f3-81d6-4726-b679-f0a8917846de.mp4"
          curl -fsSL -o docs/assets/hero2-web.mp4 "https://d2ol7oe51mr4n9.cloudfront.net/user_3FT2vQpL2ETEU7cpreHRkz8vsHo/6d2c730e-c2db-4522-9d32-b5b96fc4c54f.mp4"
          curl -fsSL -o docs/assets/contact-web.mp4 "https://d2ol7oe51mr4n9.cloudfront.net/user_3FT2vQpL2ETEU7cpreHRkz8vsHo/cb0fe88c-7141-45bf-ad7c-92821209ef57.mp4"
          echo "7803fe8accf9e149c1b1fd71d50b615a76273e0dafad360565995fa74cba0632  docs/assets/hero-web.mp4" | sha256sum -c
          echo "1d503a60be71e26ad09d12c25ff8d406bb7bd1969bb0de86564468940089d874  docs/assets/hero2-web.mp4" | sha256sum -c
          echo "3f1cd85c36c3c7dee09e23a9bab9107d2d91d61316419ed45613c73888553db0  docs/assets/contact-web.mp4" | sha256sum -c
      - name: commit to main
        run: |
          git config user.name "sophonfinance-wq"
          git config user.email "contact@sophonfinance.com"
          git add docs/assets/hero-web.mp4 docs/assets/hero2-web.mp4 docs/assets/contact-web.mp4
          git commit -m "site: 720p re-encodes of the three films - 43 percent lighter for instant autoplay"
          git push
